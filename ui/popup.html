<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteReader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="popup-header">
            <h1>SiteReader</h1>
            <p class="subtitle" id="pageTitle">Loading page title...</p>
        </div>

        <!-- Chapters List -->
        <div class="chapters-section" id="chaptersContainer" style="display: none;">
            <div class="section-title">Chapters</div>
            <div class="chapters-list" id="chaptersList">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Playback Controls -->
        <div class="controls">
            <button id="playBtn" class="control-btn primary" title="Play">
                <span class="icon">▶</span>
                <span class="label">Play</span>
            </button>

            <button id="pauseBtn" class="control-btn" title="Pause">
                <span class="icon">⏸</span>
                <span class="label">Pause</span>
            </button>

            <button id="stopBtn" class="control-btn" title="Stop">
                <span class="icon">⏹</span>
                <span class="label">Stop</span>
            </button>
        </div>

        <!-- Additional Controls -->
        <div class="additional-controls">
            <button id="restartBtn" class="secondary-btn" title="Restart Chapter">
                ↻ Restart
            </button>
            <button id="logsBtn" class="secondary-btn" title="View Logs">
                📋 Logs
            </button>
        </div>

        <!-- Status Display -->
        <div class="status" id="status">
            <span class="status-label">Ready</span>
            <span class="status-indicator" id="statusIndicator"></span>
        </div>
    </div>

    <script src="../src/logger.js"></script>
    <script src="popup.js"></script>
</body>
</html>
