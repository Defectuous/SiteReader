<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteReader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="popup-header">
            <h1>SiteReader</h1>
            <p class="subtitle" id="pageTitle">Loading page title...</p>
        </div>

        <!-- Chapter Info -->
        <div class="chapter-info">
            <div class="chapter-title" id="chapterTitle">Loading...</div>
            <div class="chapter-progress">
                <span id="chapterCount">0</span> / <span id="totalChapters">0</span>
            </div>
        </div>

        <!-- Chapters List -->
        <div class="chapters-section" id="chaptersContainer" style="display: none;">
            <div class="section-title">Chapters</div>
            <div class="chapters-list" id="chaptersList">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Playback Controls -->
        <div class="controls">
            <button id="prevBtn" class="control-btn" title="Previous Chapter">
                <span class="icon">⏮</span>
                <span class="label">Previous</span>
            </button>

            <button id="playBtn" class="control-btn primary" title="Play">
                <span class="icon">▶</span>
                <span class="label">Play</span>
            </button>

            <button id="pauseBtn" class="control-btn" title="Pause">
                <span class="icon">⏸</span>
                <span class="label">Pause</span>
            </button>

            <button id="stopBtn" class="control-btn" title="Stop">
                <span class="icon">⏹</span>
                <span class="label">Stop</span>
            </button>

            <button id="nextBtn" class="control-btn" title="Next Chapter">
                <span class="icon">⏭</span>
                <span class="label">Next</span>
            </button>
        </div>

        <!-- Additional Controls -->
        <div class="additional-controls">
            <button id="restartBtn" class="secondary-btn" title="Restart Chapter">
                ↻ Restart
            </button>
            <button id="logsBtn" class="secondary-btn" title="View Logs">
                📋 Logs
            </button>
        </div>

        <!-- Status Display -->
        <div class="status" id="status">
            <span class="status-label">Ready</span>
            <span class="status-indicator" id="statusIndicator"></span>
        </div>

        <!-- Settings -->
        <div class="settings">
            <div class="setting-item">
                <label for="rateSlider">Speech Rate:</label>
                <div class="slider-container">
                    <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1.0">
                    <span class="slider-value" id="rateValue">1.0x</span>
                </div>
            </div>

            <div class="setting-item">
                <label for="pitchSlider">Pitch:</label>
                <div class="slider-container">
                    <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1.0">
                    <span class="slider-value" id="pitchValue">1.0x</span>
                </div>
            </div>

            <div class="setting-item">
                <label for="volumeSlider">Volume:</label>
                <div class="slider-container">
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1.0">
                    <span class="slider-value" id="volumeValue">100%</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../src/logger.js"></script>
    <script src="popup.js"></script>
</body>
</html>
